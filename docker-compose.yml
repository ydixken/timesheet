services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timesheet
      POSTGRES_USER: timesheet
      POSTGRES_PASSWORD: timesheet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesheet"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgres://timesheet:timesheet@db:5432/timesheet
      AUTH_MODE: none
      JWT_SECRET: dev-secret-change-in-prod
      ADMIN_USER: yannick
      ADMIN_PASS: changeme
      UPLOADS_DIR: /uploads
      PORT: "3000"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "4173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads:
